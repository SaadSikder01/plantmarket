<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>চ্যাট - প্ল্যান্ট মার্কেট</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --primary-light: #4caf50;
            --accent: #ffd700;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --white: #ffffff;
            --gray-light: #f8f9fa;
            --gray: #e9ecef;
            --danger: #dc3545;
            --success: #28a745;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: var(--white);
            height: 100vh;
            overflow: hidden;
        }

        /* হেডার */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            font-size: 28px;
            color: var(--accent);
        }

        .logo h1 {
            font-size: 24px;
            color: white;
        }

        .back-home {
            color: white;
            font-size: 20px;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-home:hover {
            background: rgba(255,255,255,0.2);
        }

        /* চ্যাট কন্টেইনার - মেসেঞ্জার স্টাইল */
        .chat-container {
            display: flex;
            height: calc(100vh - 70px);
            background: var(--white);
        }

        /* চ্যাট লিস্ট সাইডবার */
        .chat-sidebar {
            width: 350px;
            border-right: 1px solid var(--gray);
            background: var(--gray-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-sidebar h3 {
            padding: 20px;
            background: var(--primary);
            color: white;
            margin: 0;
            font-size: 18px;
        }

        .chat-search {
            padding: 15px;
            border-bottom: 1px solid var(--gray);
        }

        .chat-search input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--gray);
            border-radius: 30px;
            font-size: 14px;
        }

        .chat-search input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid var(--gray);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .chat-item:hover {
            background: var(--gray);
        }

        .chat-item.active {
            background: rgba(46,125,50,0.1);
            border-left: 3px solid var(--primary);
        }

        .chat-item.unread {
            background: rgba(255,215,0,0.1);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .chat-info .last-time {
            font-size: 11px;
            color: var(--text-light);
            font-weight: normal;
        }

        .chat-info .last-message {
            font-size: 13px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-count {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            padding: 0 5px;
        }

        /* চ্যাট মেইন এরিয়া */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }

        .chat-header {
            padding: 15px 25px;
            background: var(--white);
            border-bottom: 1px solid var(--gray);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chat-header .user-info h3 {
            font-size: 16px;
            margin-bottom: 3px;
        }

        .chat-header .user-info p {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .online-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
        }

        /* মেসেজ এরিয়া */
        .messages-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: var(--gray-light);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            clear: both;
            animation: messageAppear 0.3s ease;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-content {
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            font-size: 14px;
            max-width: 100%;
        }

        .message.sent .message-content {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-content {
            background: white;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            cursor: pointer;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            color: rgba(255,255,255,0.7);
            text-align: right;
        }

        .message.received .message-time {
            color: var(--text-light);
        }

        /* নতুন মেসেজ ইন্ডিকেটর */
        .new-message-indicator {
            text-align: center;
            margin: 10px 0;
            color: var(--primary);
            font-weight: 600;
            font-size: 12px;
            background: rgba(255,215,0,0.2);
            padding: 5px;
            border-radius: 20px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        /* ইনপুট এরিয়া */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid var(--gray);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid var(--gray);
            border-radius: 25px;
            resize: none;
            font-size: 14px;
            font-family: inherit;
            max-height: 100px;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .image-upload-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: var(--transition);
        }

        .image-upload-btn:hover {
            background: var(--primary-dark);
        }

        #imageInput {
            display: none;
        }

        .send-btn {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ইমেজ প্রিভিউ মোডাল */
        .image-preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5000;
        }

        .image-preview-modal img {
            max-width: 90%;
            max-height: 90%;
        }

        .close-preview {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        /* টোস্ট */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3000;
        }

        .toast {
            background: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* মোবাইল রেসপনসিভ */
        @media (max-width: 768px) {
            .chat-sidebar {
                width: 100%;
                position: absolute;
                left: 0;
                top: 70px;
                bottom: 0;
                z-index: 10;
                transition: left 0.3s ease;
            }

            .chat-sidebar.hidden {
                left: -100%;
            }

            .chat-main {
                width: 100%;
            }

            .back-to-list {
                display: block;
                background: none;
                border: none;
                font-size: 20px;
                cursor: pointer;
                color: var(--primary);
                margin-right: 10px;
            }

            .message {
                max-width: 85%;
            }

            .message-image {
                max-width: 150px;
            }

            .input-area {
                padding: 15px;
            }

            .send-btn span {
                display: none;
            }

            .send-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <!-- ইমেজ প্রিভিউ মোডাল -->
    <div class="image-preview-modal" id="imagePreviewModal" onclick="this.style.display='none'">
        <span class="close-preview">&times;</span>
        <img id="previewImage" src="" alt="Preview">
    </div>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-leaf"></i>
                    <h1>প্ল্যান্ট মার্কেট</h1>
                </div>
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> হোম</a>
            </div>
        </div>
    </header>

    <div class="chat-container">
        <!-- চ্যাট লিস্ট সাইডবার -->
        <div class="chat-sidebar" id="chatSidebar">
            <h3><i class="fas fa-comments"></i> চ্যাট সমূহ</h3>
            <div class="chat-search">
                <input type="text" id="chatSearch" placeholder="খুঁজুন..." onkeyup="searchChats()">
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- চ্যাট মেইন এরিয়া -->
        <div class="chat-main">
            <div class="chat-header">
                <button class="back-to-list" id="backToList" onclick="toggleSidebar()" style="display: none;">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="user-avatar" id="chatAvatar">U</div>
                <div class="user-info">
                    <h3 id="chatWithName">চ্যাট নির্বাচন করুন</h3>
                    <p id="chatWithStatus"><span class="online-status" id="onlineStatus" style="background:#dc3545;"></span> অফলাইন</p>
                </div>
            </div>

            <!-- মেসেজ এরিয়া -->
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: var(--text-light); padding: 40px;">
                    <i class="fas fa-comment-dots" style="font-size: 40px;"></i>
                    <p>বাম পাশের তালিকা থেকে একটি চ্যাট নির্বাচন করুন</p>
                </div>
            </div>

            <!-- ইনপুট এরিয়া -->
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="file" id="imageInput" accept="image/*" onchange="sendImage()">
                <button class="image-upload-btn" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-image"></i>
                </button>
                <textarea id="messageInput" placeholder="মেসেজ লিখুন..." rows="1"></textarea>
                <button onclick="sendMessage()" class="send-btn" id="sendBtn">
                    <i class="fas fa-paper-plane"></i> <span>পাঠান</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAmWjUML3MTC4Uuw-qX_oOzZkemw95Iors",
            authDomain: "naruto-76eb1.firebaseapp.com",
            databaseURL: "https://naruto-76eb1-default-rtdb.firebaseio.com",
            projectId: "naruto-76eb1",
            storageBucket: "naruto-76eb1.firebasestorage.app",
            messagingSenderId: "321658766206",
            appId: "1:321658766206:web:ec60429bf933551692a92f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const CLOUD_NAME = 'dplj1p2gh';
        const UPLOAD_PRESET = 'plant_market';

        let currentUser = null;
        let currentChatWith = null;
        let currentChatId = null;
        let currentProductId = null;
        let currentListener = null;
        let lastMessageTime = null; // নতুন মেসেজ শনাক্ত করতে

        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        function showToast(type, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function uploadImage(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            return data.secure_url;
        }

        // ইমেজ পাঠানো
        window.sendImage = async function() {
            const fileInput = document.getElementById('imageInput');
            const file = fileInput.files[0];
            if (!file || !currentChatId) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            try {
                const imageUrl = await uploadImage(file);

                const message = {
                    senderId: currentUser.uid,
                    receiverId: currentChatWith,
                    type: 'image',
                    imageUrl: imageUrl,
                    timestamp: new Date().toISOString(),
                    read: false
                };

                await database.ref(`chats/${currentChatId}/messages`).push(message);
                await database.ref(`chats/${currentChatId}/lastMessage`).set({
                    text: '📷 ছবি',
                    timestamp: message.timestamp,
                    senderId: currentUser.uid
                });

                await updateChatLists('📷 ছবি', message.timestamp);

                fileInput.value = '';
            } catch (error) {
                showToast('error', error.message);
            } finally {
                btn.disabled = false;
            }
        };

        // অথ চেক
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;

            const params = new URLSearchParams(window.location.search);
            const sellerId = params.get('seller');
            const productId = params.get('product');
            const chatUserId = params.get('user');

            if (sellerId && productId) {
                currentChatWith = sellerId;
                currentProductId = productId;
                currentChatId = [currentUser.uid, sellerId, productId].sort().join('_');
                loadChat();
            } else if (chatUserId) {
                currentChatWith = chatUserId;
                const chats = await database.ref(`users/${currentUser.uid}/chats`).once('value');
                chats.forEach(child => {
                    const chat = child.val();
                    if (chat.withUserId === chatUserId) {
                        const ids = child.key.split('_');
                        for (let id of ids) {
                            if (id !== currentUser.uid && id !== chatUserId) {
                                currentProductId = id;
                                break;
                            }
                        }
                        currentChatId = child.key;
                    }
                });
                if (currentChatId) loadChat();
            }

            loadUserChatList();

            // মোবাইলে সাইডবার টগল
            if (window.innerWidth <= 768) {
                document.getElementById('chatSidebar').classList.add('hidden');
                document.getElementById('backToList').style.display = 'block';
            }
        });

        async function updateChatLists(lastMessageText, timestamp) {
            const receiver = await database.ref('users/' + currentChatWith).once('value');
            const receiverName = receiver.val()?.name || 'ইউজার';
            await database.ref(`users/${currentUser.uid}/chats/${currentChatId}`).set({
                withUserId: currentChatWith, withUserName: receiverName,
                lastMessage: lastMessageText, lastMessageTime: timestamp, unread: false
            });

            const sender = await database.ref('users/' + currentUser.uid).once('value');
            const senderName = sender.val()?.name || 'ইউজার';
            await database.ref(`users/${currentChatWith}/chats/${currentChatId}`).set({
                withUserId: currentUser.uid, withUserName: senderName,
                lastMessage: lastMessageText, lastMessageTime: timestamp, unread: true
            });
        }

        function loadUserChatList() {
            database.ref(`users/${currentUser.uid}/chats`).on('value', (snapshot) => {
                const chats = [];
                snapshot.forEach(child => {
                    chats.push({ id: child.key, ...child.val() });
                });
                // নতুন মেসেজ যাদের আছে তারা উপরে থাকবে
                chats.sort((a, b) => {
                    if (a.unread && !b.unread) return -1;
                    if (!a.unread && b.unread) return 1;
                    return new Date(b.lastMessageTime) - new Date(a.lastMessageTime);
                });
                displayChatList(chats);
            });
        }

        function displayChatList(chats) {
            const container = document.getElementById('chatList');
            container.innerHTML = '';

            if (chats.length === 0) {
                container.innerHTML = '<p style="padding:20px; text-align:center;">কোন চ্যাট নেই</p>';
                return;
            }

            chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.unread ? 'unread' : ''} ${chat.withUserId === currentChatWith ? 'active' : ''}`;
                item.onclick = () => {
                    currentChatWith = chat.withUserId;
                    currentChatId = chat.id;
                    const ids = chat.id.split('_');
                    for (let id of ids) {
                        if (id !== currentUser.uid && id !== chat.withUserId) {
                            currentProductId = id;
                            break;
                        }
                    }
                    loadChat();
                    database.ref(`users/${currentUser.uid}/chats/${chat.id}/unread`).set(false);
                    if (window.innerWidth <= 768) {
                        document.getElementById('chatSidebar').classList.add('hidden');
                    }
                };

                const firstLetter = chat.withUserName.charAt(0).toUpperCase();
                const time = new Date(chat.lastMessageTime).toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });
                const lastMsg = chat.lastMessage || '';

                item.innerHTML = `
                    <div class="chat-avatar">${firstLetter}</div>
                    <div class="chat-info">
                        <h4>${chat.withUserName} <span class="last-time">${time}</span></h4>
                        <div class="last-message">${lastMsg}</div>
                    </div>
                    ${chat.unread ? '<span class="unread-count">নতুন</span>' : ''}
                `;
                container.appendChild(item);
            });
        }

        window.searchChats = function() {
            const term = document.getElementById('chatSearch').value.toLowerCase();
            document.querySelectorAll('#chatList .chat-item').forEach(item => {
                const name = item.querySelector('.chat-info h4').childNodes[0].textContent.toLowerCase();
                item.style.display = name.includes(term) ? 'flex' : 'none';
            });
        };

        function loadChat() {
            if (!currentChatId) return;

            if (currentListener) {
                database.ref(`chats/${currentChatId}/messages`).off('value', currentListener);
            }

            // শেষ মেসেজের সময় রিসেট
            lastMessageTime = null;

            currentListener = database.ref(`chats/${currentChatId}/messages`).orderByChild('timestamp').on('value', (snapshot) => {
                const messages = [];
                snapshot.forEach(child => {
                    const msg = child.val();
                    msg.id = child.key;
                    messages.push(msg);

                    if (msg.receiverId === currentUser.uid && !msg.read) {
                        database.ref(`chats/${currentChatId}/messages/${child.key}/read`).set(true);
                    }
                });

                displayMessages(messages);
            });

            database.ref('users/' + currentChatWith).once('value').then((snapshot) => {
                const user = snapshot.val();
                const name = user?.name || 'ইউজার';
                document.getElementById('chatWithName').textContent = name;
                document.getElementById('chatAvatar').textContent = name.charAt(0).toUpperCase();

                const status = document.getElementById('chatWithStatus');
                const dot = document.getElementById('onlineStatus');
                if (user?.online) {
                    dot.style.background = '#28a745';
                    status.innerHTML = '<span class="online-status" style="background:#28a745;"></span> অনলাইন';
                } else {
                    dot.style.background = '#dc3545';
                    const last = user?.lastSeen ? new Date(user.lastSeen).toLocaleString('bn-BD') : 'অজানা';
                    status.innerHTML = `<span class="online-status" style="background:#dc3545;"></span> সর্বশেষ: ${last}`;
                }
            });

            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('messagesArea').innerHTML = '';
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';

            if (messages.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#7f8c8d; padding:30px;">কোন মেসেজ নেই</p>';
                return;
            }

            let newMessageIndex = -1;
            if (lastMessageTime) {
                // নতুন মেসেজ কোথায় শুরু হয়েছে তা খুঁজে বের করা
                for (let i = 0; i < messages.length; i++) {
                    if (new Date(messages[i].timestamp) > new Date(lastMessageTime)) {
                        newMessageIndex = i;
                        break;
                    }
                }
            }

            messages.forEach((msg, index) => {
                // নতুন মেসেজ ইন্ডিকেটর
                if (newMessageIndex === index) {
                    const indicator = document.createElement('div');
                    indicator.className = 'new-message-indicator';
                    indicator.textContent = '🔔 নতুন মেসেজ';
                    container.appendChild(indicator);
                }

                const div = document.createElement('div');
                div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                const time = new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });

                if (msg.type === 'image') {
                    div.innerHTML = `
                        <div class="message-content">
                            <img src="${msg.imageUrl}" class="message-image" onclick="showImagePreview('${msg.imageUrl}')">
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="message-content">
                            ${msg.text}
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                }

                container.appendChild(div);
            });

            // শেষ মেসেজের সময় আপডেট
            if (messages.length > 0) {
                lastMessageTime = messages[messages.length - 1].timestamp;
            }

            container.scrollTop = container.scrollHeight;
        }

        window.showImagePreview = function(url) {
            document.getElementById('previewImage').src = url;
            document.getElementById('imagePreviewModal').style.display = 'flex';
        };

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            const message = {
                senderId: currentUser.uid,
                receiverId: currentChatWith,
                type: 'text',
                text: text,
                timestamp: new Date().toISOString(),
                read: false
            };

            try {
                await database.ref(`chats/${currentChatId}/messages`).push(message);
                await database.ref(`chats/${currentChatId}/lastMessage`).set({
                    text: text,
                    timestamp: message.timestamp,
                    senderId: currentUser.uid
                });

                await updateChatLists(text, message.timestamp);

                input.value = '';
            } catch (error) {
                showToast('error', error.message);
            } finally {
                btn.disabled = false;
            }
        };

        window.toggleSidebar = function() {
            const sidebar = document.getElementById('chatSidebar');
            sidebar.classList.toggle('hidden');
        };

        document.getElementById('messageInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // মোবাইল রেসপনসিভ: ব্যাক বাটন দেখানো/লুকানো
        window.addEventListener('resize', function() {
            if (window.innerWidth <= 768) {
                document.getElementById('backToList').style.display = 'block';
            } else {
                document.getElementById('backToList').style.display = 'none';
                document.getElementById('chatSidebar').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
