    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --primary-light: #4caf50;
            --accent: #ffd700;
            --accent-dark: #ffc107;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --white: #ffffff;
            --gray-light: #f8f9fa;
            --gray: #e9ecef;
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-hover: 0 15px 40px rgba(0,0,0,0.15);
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: var(--gray-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* হেডার */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            font-size: 28px;
            color: var(--accent);
            animation: leafWave 2s ease-in-out infinite;
        }

        @keyframes leafWave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(45deg, var(--white), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ডেস্কটপ মেনু */
        .desktop-menu {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 15px;
            align-items: center;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            padding: 8px 15px;
            border-radius: 25px;
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .nav-links a.active {
            background: var(--accent);
            color: var(--primary-dark);

        }

            display: flex;

        }

        .btn-login, .btn-register, .btn-logout {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-login {
            background: transparent;
            border: 2px solid var(--white);
            color: var(--white);
        }

        .btn-login:hover {
            background: var(--white);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .btn-register {
            background: var(--accent);
            color: var(--primary-dark);
        }

        .btn-register:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }

        .btn-logout {
            background: var(--danger);
            color: var(--white);
            padding: 8px 12px;
        }

        .btn-logout:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 30px;
        }

        .user-profile span {
            font-weight: 600;
            color: var(--white);
            font-size: 15px;
        }

        /* মোবাইল ডান অংশ */
        .mobile-right {
            display: none;
            align-items: center;
            gap: 15px;
        }

        .mobile-chat-link {
            position: relative;
            color: white;
            font-size: 20px;

        }

        .mobile-menu-btn {
            background: none;
            border: none;
            color: var(--white);
            font-size: 24px;
            cursor: pointer;

        .search-section {

            max-width: 800px;

            display: flex;
            gap: 10px;
            padding: 0 20px;
        }

        .search-container input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid var(--gray);
            border-radius: 30px;
            font-size: 16px;
            font-family: inherit;
            transition: var(--transition);
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .search-container button {
            padding: 0 30px;
            background: var(--primary);
            border: none;
            border-radius: 30px;
            color: var(--white);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-container button:hover {
            background: var(--primary-dark);
        }

        /* ফিল্টার সেকশন */
        .filter-section {
            background: var(--white);
            padding: 15px 0;
            border-bottom: 1px solid var(--gray);
            overflow-x: auto;
            white-space: nowrap;
        }

        .filter-container {
            display: flex;
            gap: 10px;
            padding: 0 20px;
        }

        .filter-btn {
            padding: 10px 25px;
            border: 2px solid var(--primary);
            border-radius: 30px;
            background: transparent;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 15px;

        .filter-btn:hover {
            background: var(--primary);
            color: var(--white);
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--white);
        }

        .products {

        .product-card {

            transition: var(--transition);

        .product-card:hover .product-image {

        .product-info {

        .product-name {
            font-size: 18px;

            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
        }

        .btn-chat:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-whatsapp {
            flex: 1;
            padding: 10px;
            background: #25D366;
            color: var(--white);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-whatsapp:hover {
            background: #128C7E;
        }

        /* মোডাল */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            overflow: auto;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--white);
            margin: 50px auto;
            padding: 30px;
            border-radius: var(--border-radius);
            max-width: 400px;
            position: relative;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-light);
            transition: var(--transition);
        }

        .close:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }

        .modal h2 {
            color: var(--primary);
            margin-bottom: 25px;
            text-align: center;
            font-size: 24px;
        }

        .modal input, .modal select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid var(--gray);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
        }

        .modal input:focus, .modal select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* টোস্ট */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3000;
        }

        .toast {
            background: var(--white);
            color: var(--text-dark);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }

        .toast i {
            font-size: 20px;
        }

        .toast.success i { color: var(--success); }
        .toast.error i { color: var(--danger); }
        .toast.warning i { color: var(--warning); }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* মোবাইল রেসপনসিভ */
        @media (max-width: 768px) {
            .desktop-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                flex-direction: column;
                padding: 20px;
                gap: 15px;
                box-shadow: var(--shadow);
            }

            .desktop-menu.active {
                display: flex;
            }

            .nav-links {
                flex-direction: column;
                width: 100%;
            }

            .nav-links a {
                width: 100%;
                text-align: center;
                justify-content: center;
            }

            .auth-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn-login, .btn-register {
                width: 100%;
                justify-content: center;
            }

            .user-profile {
                width: 100%;
                justify-content: center;
            }

            .mobile-right {
                display: flex;
            }

            .mobile-menu-btn {
                display: block;
            }

            .mobile-chat-link {
                display: none; /* JS dynamically show */
            }

            .search-container {
                flex-direction: column;
            }

            .search-container button {
                width: 100%;
                padding: 12px;
            }

            .product-grid {
                grid-template-columns: 1fr;
                padding: 0 10px;
            }

            .modal-content {
                margin: 20px;
                padding: 20px;
            }

            .toast-container {
                left: 20px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            .logo h1 {
                font-size: 20px;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 14px;
            }

            .product-card {
                margin: 0 5px;
            }
        }
    </style>
</head>

    <header class="header">
        <div class="container">

                <div class="logo">
                    <i class="fas fa-leaf"></i>

                </div>

                            <a id="chatLinkDesktop" href="chat.html" style="display: none;">

                    </div>
                    
                    <div class="user-profile" id="userProfile" style="display: none;">
                        <i class="fas fa-user-circle"></i>

                </div>

                <!-- মোবাইল ডান অংশ -->
                <div class="mobile-right">
                    <a id="chatLinkMobile" class="mobile-chat-link" href="chat.html" style="display: none;">
                        <i class="fas fa-comment"></i>
                        <span id="chatNotificationMobile" class="notification-badge" style="display: none;">0</span>

    <div id="homePage">
        <div class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="আপনার পছন্দের গাছ খুঁজুন...">
                <button onclick="searchProducts()"><i class="fas fa-search"></i> খুঁজুন</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-container">
                <button class="filter-btn active" onclick="filterProducts('all')">সব গাছ</button>
                <button class="filter-btn" onclick="filterProducts('fruit')">ফলের গাছ</button>
                <button class="filter-btn" onclick="filterProducts('flower')">ফুলের গাছ</button>
                <button class="filter-btn" onclick="filterProducts('herb')">ভেষজ গাছ</button>
                <button class="filter-btn" onclick="filterProducts('indoor')">ইনডোর</button>
                <button class="filter-btn" onclick="filterProducts('succulent')">সাকুলেন্ট</button>
                <button class="filter-btn" onclick="filterProducts('cactus')">ক্যাকটাস</button>
                <button class="filter-btn" onclick="filterProducts('rare')">রেয়ার</button>
                <button class="filter-btn" onclick="filterProducts('other')">অন্যান্য</button>
            </div>
        </div>

        <section class="products">
            <div class="product-grid" id="productGrid"></div>
        </section>
    </div>

    <!-- লগইন মোডাল -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2><i class="fas fa-sign-in-alt"></i> লগইন</h2>
            <form onsubmit="handleLogin(event)">
                <input type="email" id="loginEmail" placeholder="ইমেইল" required>
                <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড" required>
                <button type="submit"><i class="fas fa-sign-in-alt"></i> লগইন</button>
                <p style="text-align: center; margin-top: 12px;">
                    নতুন? <a href="#" onclick="showRegisterModal(); closeModal('loginModal');">রেজিস্টার</a>
                </p>
            </form>
        </div>
    </div>

    <!-- রেজিস্টার মোডাল -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2><i class="fas fa-user-plus"></i> রেজিস্টার</h2>
            <form onsubmit="handleRegister(event)">
                <input type="text" id="regName" placeholder="নাম" required>
                <input type="email" id="regEmail" placeholder="ইমেইল" required>
                <input type="password" id="regPassword" placeholder="পাসওয়ার্ড" required>
                <select id="regUserType" required>

                    <option value="buyer">ক্রেতা</option>
                    <option value="seller">বিক্রেতা</option>
                </select>
                <button type="submit"><i class="fas fa-user-plus"></i> রেজিস্টার</button>
            </form>
        </div>
    </div>

            setTimeout(() => toast.remove(), 3000);
        }

        // নোটিফিকেশন আপডেট (দুটি ব্যাজের জন্যই)
        function updateNotifications() {
            if (!currentUser) return;
            
            database.ref(`users/${currentUser.uid}/chats`).on('value', (snapshot) => {
                let totalUnread = 0;
                snapshot.forEach(child => {
                    if (child.val().unread) totalUnread++;
                });
                
                const badgeDesktop = document.getElementById('chatNotificationDesktop');
                const badgeMobile = document.getElementById('chatNotificationMobile');
                
                if (totalUnread > 0) {
                    const displayText = totalUnread > 9 ? '9+' : totalUnread;
                    if (badgeDesktop) {
                        badgeDesktop.style.display = 'flex';
                        badgeDesktop.textContent = displayText;
                    }
                    if (badgeMobile) {
                        badgeMobile.style.display = 'flex';
                        badgeMobile.textContent = displayText;
                    }
                } else {
                    if (badgeDesktop) badgeDesktop.style.display = 'none';
                    if (badgeMobile) badgeMobile.style.display = 'none';
                }
            });
        }

        // অথ স্টেট
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const snapshot = await database.ref('users/' + user.uid).once('value');
                currentUserData = snapshot.val();

                if (!currentUserData) {
                    currentUserData = {
                        name: user.email.split('@')[0],
                        email: user.email,
                        userType: 'buyer',
                        createdAt: new Date().toISOString()
                    };
                    await database.ref('users/' + user.uid).set(currentUserData);
                }

                // UI আপডেট
                document.getElementById('authButtons').style.display = 'none';
                document.getElementById('userProfile').style.display = 'flex';
                document.getElementById('userNameDisplay').textContent = currentUserData.name;

                // সেলার লিংক
                if (currentUserData.userType === 'seller') {
                    document.getElementById('sellerLink').style.display = 'block';
                }

                // চ্যাট লিংক দেখানো (ডেস্কটপ ও মোবাইল)
                const chatDesktop = document.getElementById('chatLinkDesktop');
                const chatMobile = document.getElementById('chatLinkMobile');
                if (chatDesktop) chatDesktop.style.display = 'flex';
                if (chatMobile) chatMobile.style.display = 'flex';

                await database.ref('users/' + user.uid).update({
                    online: true,
                    lastSeen: new Date().toISOString()
                });

                loadProducts();
                updateNotifications();
            } else {
                currentUser = null;
                currentUserData = null;
                
                document.getElementById('authButtons').style.display = 'flex';
                document.getElementById('userProfile').style.display = 'none';
                document.getElementById('sellerLink').style.display = 'none';
                
                // চ্যাট লিংক লুকানো
                const chatDesktop = document.getElementById('chatLinkDesktop');
                const chatMobile = document.getElementById('chatLinkMobile');
                if (chatDesktop) chatDesktop.style.display = 'none';
                if (chatMobile) chatMobile.style.display = 'none';
                
                const badgeDesktop = document.getElementById('chatNotificationDesktop');
                const badgeMobile = document.getElementById('chatNotificationMobile');
                if (badgeDesktop) badgeDesktop.style.display = 'none';
                if (badgeMobile) badgeMobile.style.display = 'none';
                
                loadProducts();
            }
        });

        // প্রোডাক্ট লোড
        function loadProducts() {
            database.ref('products').on('value', (snapshot) => {
                const products = [];
                snapshot.forEach(child => {
                    const product = child.val();
                    product.id = child.key;
                    products.push(product);
                });
                products.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                displayProducts(products);
            });
        }

        function displayProducts(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            if (products.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 50px; color: #7f8c8d;">কোন পণ্য নেই</div>';
                return;
            }

            const categoryNames = {
                fruit: 'ফলের গাছ', flower: 'ফুলের গাছ', herb: 'ভেষজ গাছ',
                indoor: 'ইনডোর', succulent: 'সাকুলেন্ট', cactus: 'ক্যাকটাস',
                rare: 'রেয়ার', other: 'অন্যান্য'
            };

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-badge">${categoryNames[p.category] || 'অন্যান্য'}</div>
                    <img src="${p.imageUrl}" alt="${p.name}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <h3 class="product-name">${p.name}</h3>
                        <p class="product-description">${p.description.substring(0, 60)}...</p>
                        <p class="product-price">৳ ${p.price}</p>
                        <div class="product-seller"><i class="fas fa-store"></i> ${p.sellerName}</div>
                        <div class="product-actions">
                            <button class="btn-chat" onclick="startChat('${p.sellerId}', '${p.id}')">
                                <i class="fas fa-comment"></i> চ্যাট
                            </button>
                            ${p.whatsapp ? `
                                <a href="https://wa.me/${p.whatsapp.replace(/\D/g, '')}" target="_blank" class="btn-whatsapp">
                                    <i class="fab fa-whatsapp"></i>
                                </a>
                            ` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ফিল্টার
        window.filterProducts = function(category) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            database.ref('products').once('value', (snapshot) => {
                const products = [];
                snapshot.forEach(child => {
                    const p = child.val();
                    p.id = child.key;
                    products.push(p);
                });
                const filtered = category === 'all' ? products : products.filter(p => p.category === category);
                displayProducts(filtered);
            });
        };

        window.searchProducts = function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            database.ref('products').once('value', (snapshot) => {
                const products = [];
                snapshot.forEach(child => {
                    const p = child.val();
                    p.id = child.key;
                    products.push(p);
                });
                const searched = products.filter(p => 
                    p.name.toLowerCase().includes(term) || 
                    p.description.toLowerCase().includes(term)
                );
                displayProducts(searched);
            });
        };

        // চ্যাট স্টার্ট
        window.startChat = function(sellerId, productId) {
            if (!currentUser) {
                showToast('warning', 'চ্যাট করতে লগইন করুন');
                showLoginModal();
                return;
            }
            if (sellerId === currentUser.uid) {
                showToast('info', 'নিজের সাথে চ্যাট করা যাবে না');
                return;
            }
            window.location.href = `chat.html?seller=${sellerId}&product=${productId}`;
        };

        // মোডাল
        window.showLoginModal = function() {
            document.getElementById('loginModal').style.display = 'block';
        };

        window.showRegisterModal = function() {
            document.getElementById('registerModal').style.display = 'block';
        };

        window.closeModal = function(id) {
            document.getElementById(id).style.display = 'none';
        };

        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                closeModal('loginModal');
                showToast('success', 'লগইন সফল');
            } catch (error) {
                showToast('error', error.message);
            }
        };

        window.handleRegister = async function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            const type = document.getElementById('regUserType').value;

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                const user = cred.user;

                await database.ref('users/' + user.uid).set({
                    name, email, userType: type,
                    createdAt: new Date().toISOString(),
                    online: true, lastSeen: new Date().toISOString()
                });

                if (type === 'seller') {
                    await database.ref('sellers/' + user.uid).set({
                        name, email, totalProducts: 0,
                        joinedAt: new Date().toISOString()
                    });
                }

                closeModal('registerModal');
                showToast('success', 'রেজিস্টার সফল');
            } catch (error) {
                showToast('error', error.message);
            }
        };

        window.logout = function() {
            if (currentUser) {
                database.ref('users/' + currentUser.uid).update({
                    online: false,
                    lastSeen: new Date().toISOString()
                });
            }
            auth.signOut();
            showToast('info', 'লগআউট');
        };

        // মোবাইল মেনু টগল
        document.getElementById('mobileMenuBtn').addEventListener('click', function() {
            document.getElementById('desktopMenu').classList.toggle('active');
        });

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };

        window.onload = function() {
            loadProducts();
        };
    </script>
</body>
</html>
